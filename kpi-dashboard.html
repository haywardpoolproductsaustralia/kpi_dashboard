<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayward KPI — Weekly Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
  :root {
    --blue:#0038FF; --navy:#001F8C; --accent:#00C2FF;
    --bg:#F0F6FF; --surface:#FFFFFF; --surface2:#EBF3FF;
    --border:#D0E4FF; --border2:#B8D4FF;
    --text:#060E2B; --muted:#6B8BB5; --secondary:#3A5A9C;
    --green:#00C47A; --red:#FF2D55; --amber:#FF9500; --purple:#8B00FF; --pink:#FF2D9B;
    --green-bg:#E6FFF5; --red-bg:#FFF0F3; --amber-bg:#FFF8ED; --purple-bg:#F5EEFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* Subtle dot grid background */
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, #B8D4FF 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 60%, #0099FF 100%);
    padding: 0 36px; display: flex; align-items: center; justify-content: space-between;
    height: 72px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,56,255,0.25);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-mark svg { width: 26px; height: 26px; }
  .header-title { font-size: 19px; font-weight: 800; color: white; letter-spacing: -0.02em; }
  .header-title span { color: #7DDFFF; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; letter-spacing: 0.06em; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .week-select {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 7px 12px; border-radius: 8px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace; cursor: pointer; max-width: 170px;
  }
  .week-select option { color: var(--text); background: white; }
  .hdr-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35);
    color: white; padding: 8px 18px; border-radius: 8px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'Sora', sans-serif; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    transition: all 0.2s; letter-spacing: 0.04em;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.28); transform: translateY(-1px); }

  /* TOOLBAR */
  .toolbar {
    background: white; border-bottom: 2px solid var(--border);
    padding: 10px 36px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 72px; z-index: 99;
    box-shadow: 0 2px 12px rgba(0,56,255,0.06);
  }
  .toolbar-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); white-space: nowrap; }
  .range-btns { display: flex; gap: 4px; }
  .range-btn {
    padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border);
    font-size: 11px; font-weight: 700; cursor: pointer; background: transparent;
    color: var(--muted); transition: all 0.15s; font-family: 'Sora', sans-serif; letter-spacing: 0.04em;
  }
  .range-btn:hover { border-color: var(--blue); color: var(--blue); }
  .range-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
  .toolbar-divider { width: 1px; height: 22px; background: var(--border); }
  .toolbar-hint { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.02em; }

  /* MAIN */
  .main { padding: 24px 36px 60px; max-width: 1440px; margin: 0 auto; position: relative; z-index: 1; }

  /* SUMMARY BAR */
  .summary-bar { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; margin-bottom: 28px; }
  .summary-item {
    background: white; border: 2px solid var(--border); border-radius: 16px;
    padding: 20px 14px; text-align: center; position: relative; overflow: hidden;
    transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,56,255,0.06);
  }
  .summary-item::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--item-color, var(--blue));
  }
  .summary-item:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,56,255,0.14); border-color: var(--item-color, var(--blue)); }
  .summary-item-value { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }
  .summary-item-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

  /* SECTION */
  .section-block { margin-bottom: 32px; }
  .section-label { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .section-icon {
    width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0; border: 2px solid var(--border);
  }
  .section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--secondary); }
  .section-divider { flex: 1; height: 2px; background: linear-gradient(to right, var(--border), transparent); }
  .sub-section-label {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--blue); margin: 20px 0 10px; padding: 8px 14px;
    background: var(--surface2); border-radius: 6px; border-left: 3px solid var(--blue);
    display: inline-block;
  }

  /* METRIC ROW */
  .metric-row {
    display: flex; background: white; border: 2px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-bottom: 8px;
    transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,56,255,0.04);
  }
  .metric-row:hover { border-color: var(--blue); box-shadow: 0 6px 24px rgba(0,56,255,0.12); transform: translateX(2px); }
  .metric-kpi {
    width: 210px; min-width: 210px; padding: 18px 20px;
    border-right: 2px solid var(--border);
    display: flex; flex-direction: column; justify-content: center;
    background: linear-gradient(160deg, var(--surface2) 0%, white 100%);
  }
  .metric-kpi-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
  .metric-kpi-value { font-size: 30px; font-weight: 800; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; line-height: 1; margin-bottom: 10px; word-break: break-all; }
  .metric-kpi-trend { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; align-self: flex-start; letter-spacing: 0.02em; }
  .trend-up { color: var(--green); background: var(--green-bg); }
  .trend-down { color: var(--red); background: var(--red-bg); }
  .trend-neutral { color: var(--amber); background: var(--amber-bg); }
  .metric-kpi-sub { font-size: 10px; color: var(--muted); margin-top: 6px; font-weight: 700; letter-spacing: 0.08em; }

  /* CHART */
  .metric-chart-outer { flex: 1; overflow-x: auto; overflow-y: hidden; min-width: 0; }
  .metric-chart-outer::-webkit-scrollbar { height: 4px; }
  .metric-chart-outer::-webkit-scrollbar-track { background: var(--surface2); }
  .metric-chart-outer::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .metric-chart-inner { height: 110px; padding: 8px 16px 6px; }

  .sub-row { background: var(--surface2) !important; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 100px 20px; }
  .empty-state h2 { font-size: 24px; color: var(--secondary); margin-bottom: 10px; font-weight: 800; }
  .empty-state p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .empty-state a { background: var(--blue); color: white; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: 800; }

  /* FOOTER */
  .footer { padding: 20px 0; border-top: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .footer-text { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.02em; }
  .footer-logo { font-size: 13px; font-weight: 800; color: var(--blue); letter-spacing: 0.12em; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.6;transform:scale(0.85);} }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .main { padding: 14px 16px 40px; } .header, .toolbar { padding-left: 16px; padding-right: 16px; }
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
    .metric-row { flex-direction: column; } .metric-kpi { width: 100%; min-width: 0; border-right: none; border-bottom: 2px solid var(--border); }
  }
</style>
</head>

<div class="main" id="main">
  <div style="text-align:center;padding:100px 0;color:var(--muted);">
    <div style="width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;"></div>
    <div style="font-size:14px;letter-spacing:0.1em;font-weight:700;color:var(--secondary);">LOADING KPI DATA...</div>
  </div>
</div>

<script>
Chart.defaults.font.family = 'Sora, sans-serif';
Chart.defaults.font.size = 10;
Chart.defaults.color = '#6B8BB5';

var allData=[], chartInstances={}, selectedWeek=null, historyRange=8;

async function loadData() {
  try {
    var res=await fetch('/api/kpi'), json=await res.json();
    allData=json.weeks||[];
    if (!allData.length) {
      document.getElementById('main').innerHTML='<div class="empty-state"><div style="font-size:64px;margin-bottom:20px;">📊</div><h2>NO DATA YET</h2><p>Start by submitting your team\'s weekly KPIs.</p><a href="kpi-entry.html">✏️ ENTER THIS WEEK\'S DATA</a></div>';
      document.getElementById('weekCountLabel').textContent='No data submitted yet';
      return;
    }
    selectedWeek=allData[allData.length-1].weekEnding;
    buildWeekPicker(); renderDashboard();
  } catch(e) {
    document.getElementById('main').innerHTML='<div class="empty-state"><h2>CONNECTION ERROR</h2><p>'+e.message+'</p></div>';
  }
}

function buildWeekPicker() {
  var picker=document.getElementById('weekPicker');
  picker.style.display='block';
  var opts='';
  for (var i=allData.length-1;i>=0;i--) { var w=allData[i]; opts+='<option value="'+w.weekEnding+'"'+(w.weekEnding===selectedWeek?' selected':'')+'>WE '+w.weekLabel+'</option>'; }
  picker.innerHTML=opts;
}

function onWeekChange(w){selectedWeek=w;renderDashboard();}

function setRange(n) {
  historyRange=n;
  ['rb8','rb13','rb26','rb0'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  document.getElementById(n===0?'rb0':'rb'+n).classList.add('active');
  renderDashboard();
}

function fmt(v,type) {
  if (v==null) return '—';
  if (type==='$') return '$'+Math.round(v).toLocaleString();
  if (type==='%') return v.toFixed(1)+'%';
  if (type==='days') return v.toFixed(1)+'d';
  return Math.round(v).toLocaleString();
}

function trendInfo(c,p,hb) {
  if (c==null||p==null) return {cls:'trend-neutral',label:'— NO PRIOR DATA'};
  var diff=c-p;
  if (Math.abs(diff)<0.001) return {cls:'trend-neutral',label:'— UNCHANGED'};
  var pct=p!==0?Math.abs((diff/p)*100).toFixed(1):'0';
  var up=diff>0,good=hb?up:!up;
  return {cls:good?'trend-up':'trend-down',label:(up?'▲':'▼')+' '+pct+'% VS LAST WK'};
}

function renderDashboard() {
  Object.keys(chartInstances).forEach(function(k){chartInstances[k].destroy();}); chartInstances={};
  var curIdx=allData.findIndex(function(w){return w.weekEnding===selectedWeek;});
  if (curIdx<0) return;
  var cur=allData[curIdx].metrics, prev=curIdx>0?allData[curIdx-1].metrics:{};
  var sliceStart=historyRange===0?0:Math.max(0,allData.length-historyRange);
  var histSlice=allData.slice(sliceStart);
  var labels=histSlice.map(function(w){return w.weekLabel;});
  var selIdxInSlice=histSlice.findIndex(function(w){return w.weekEnding===selectedWeek;});
  function hist(f){return histSlice.map(function(w){return w.metrics[f]!=null?w.metrics[f]:null;});}

  document.getElementById('weekCountLabel').textContent=histSlice.length+' WEEKS · SCROLL CHARTS ← FOR OLDER DATA';
  document.getElementById('dashSubtitle').textContent='WEEK ENDING '+allData[curIdx].weekLabel.toUpperCase()+' — LIVE KPI REPORT';

  function makeRow(label,field,fmtType,hb,color,cadence,sub) {
    var t=trendInfo(cur[field],prev[field],hb),cid='c_'+field;
    return '<div class="metric-row'+(sub?' sub-row':'')+'">'+
      '<div class="metric-kpi">'+
        '<div class="metric-kpi-label">'+label+'</div>'+
        '<div class="metric-kpi-value" style="color:'+color+'">'+fmt(cur[field],fmtType)+'</div>'+
        '<div class="metric-kpi-trend '+t.cls+'">'+t.label+'</div>'+
        '<div class="metric-kpi-sub">WEEKLY · '+cadence+'</div>'+
      '</div>'+
      '<div class="metric-chart-outer" id="outer_'+cid+'"><div class="metric-chart-inner" id="inner_'+cid+'"><canvas id="'+cid+'"></canvas></div></div>'+
    '</div>';
  }

  function subLabel(txt) { return '<div class="sub-section-label">'+txt+'</div>'; }

  var engTotal=(cur.PumpTickets||0)+(cur.CleanerTickets||0)+(cur.FilterTickets||0)+(cur.HeatingTickets||0)+(cur.SanitisationTickets||0)+(cur.OtherTickets||0);

  var html='';

  // SUMMARY
  html+='<div class="summary-bar">'+
    '<div class="summary-item" style="--item-color:#0038FF"><div class="summary-item-value" style="color:#0038FF">'+fmt(cur.Sales,'$')+'</div><div class="summary-item-label">Weekly Sales</div></div>'+
    '<div class="summary-item" style="--item-color:#00C47A"><div class="summary-item-value" style="color:#00C47A">'+fmt(cur.Margin,'%')+'</div><div class="summary-item-label">Gross Margin</div></div>'+
    '<div class="summary-item" style="--item-color:#FF9500"><div class="summary-item-value" style="color:#FF9500">'+fmt(cur.BackorderValue,'$')+'</div><div class="summary-item-label">Backorder Value</div></div>'+
    '<div class="summary-item" style="--item-color:#FF2D55"><div class="summary-item-value" style="color:#FF2D55">'+fmt(cur.AbandonRate,'%')+'</div><div class="summary-item-label">Abandoned Calls</div></div>'+
    '<div class="summary-item" style="--item-color:#8B00FF"><div class="summary-item-value" style="color:#8B00FF">'+(engTotal>0?engTotal:'—')+'</div><div class="summary-item-label">Eng Tickets</div></div>'+
    '<div class="summary-item" style="--item-color:#FF2D55"><div class="summary-item-value" style="color:#FF2D55">'+fmt(cur.OverdueValue,'$')+'</div><div class="summary-item-label">Overdue Accounts</div></div>'+
  '</div>';

  // SALES
  html+='<div class="section-block"><div class="section-label"><div class="section-icon" style="background:#EEF3FF;">💼</div><div class="section-title">Sales Team</div><div class="section-divider"></div></div>'+
    makeRow('Sales','Sales','$',true,'#0038FF','$')+
    makeRow('Gross Margin','Margin','%',true,'#00C47A','%')+
    makeRow('Avg Order Value','AvgOrderValue','$',true,'#0038FF','$')+
    makeRow('Visits — Total','VisitsTotal','int',true,'#3A5A9C','Volume')+
    makeRow('Visits — Reece','VisitsReece','int',true,'#3A5A9C','Volume')+
    makeRow('Visits — Poolwerx','VisitsPoolwerx','int',true,'#3A5A9C','Volume')+
  '</div>';

  // FINANCE
  html+='<div class="section-block"><div class="section-label"><div class="section-icon" style="background:#F5EEFF;">💰</div><div class="section-title">Finance</div><div class="section-divider"></div></div>'+
    makeRow('Overdue Accounts Value','OverdueValue','$',false,'#FF2D55','$')+
    makeRow('Overdue Accounts Count','OverdueCount','int',false,'#FF9500','Count')+
    makeRow('Days on Hand (DOH)','DOH','days',true,'#00C47A','Days')+
  '</div>';

  // MARKETING
  html+='<div class="section-block"><div class="section-label"><div class="section-icon" style="background:#FFF0F5;">📣</div><div class="section-title">Marketing</div><div class="section-divider"></div></div>'+
    subLabel('✉️ EMAIL')+
    makeRow('Emails Sent','EmailsSent','int',true,'#FF2D9B','Volume')+
    makeRow('Open Rate','EmailOpenRate','%',true,'#FF2D9B','%')+
    makeRow('Click Rate','EmailClickRate','%',true,'#FF2D9B','%')+
    makeRow('Unsubscribes','EmailUnsubs','int',false,'#FF2D55','Volume')+
    subLabel('📱 SOCIAL MEDIA')+
    makeRow('LinkedIn Impressions','LinkedInImpressions','int',true,'#0077B5','Volume')+
    makeRow('LinkedIn New Followers','LinkedInFollowers','int',true,'#0077B5','Count')+
    makeRow('Instagram Impressions','InstagramImpressions','int',true,'#E1306C','Volume')+
    makeRow('Instagram New Followers','InstagramFollowers','int',true,'#E1306C','Count')+
    subLabel('🎪 EVENTS')+
    makeRow('Events / Trade Shows','Events','int',true,'#8B00FF','Count')+
    makeRow('Leads Generated','EventLeads','int',true,'#8B00FF','Count')+
  '</div>';

  // OPERATIONS
  html+='<div class="section-block"><div class="section-label"><div class="section-icon" style="background:#E6FFF5;">⚙️</div><div class="section-title">Operations</div><div class="section-divider"></div></div>'+
    makeRow('Volume of Credits','Credits','int',false,'#FF9500','Volume')+
    makeRow('Order Entry → Invoice','OrderDays','days',false,'#00C47A','Days')+
    makeRow('Freight Cost','FreightCost','$',false,'#FF9500','$')+
    subLabel('📦 STOCK OUTAGES')+
    makeRow('Backorder Value','BackorderValue','$',false,'#FF2D55','$',true)+
    makeRow('Backorder Age (avg days)','BackorderAge','days',false,'#FF9500','Days',true)+
    makeRow('Outage — Pumps','OOSPumps','int',false,'#0038FF','SKUs',true)+
    makeRow('Outage — Cleaners','OOSCleaners','int',false,'#0038FF','SKUs',true)+
    makeRow('Outage — Filters','OOSFilters','int',false,'#0038FF','SKUs',true)+
    makeRow('Outage — Heating','OOSHeating','int',false,'#0038FF','SKUs',true)+
    makeRow('Outage — Sanitisation','OOSSanitisation','int',false,'#0038FF','SKUs',true)+
    makeRow('Outage — Other','OOSOther','int',false,'#6B8BB5','SKUs',true)+
  '</div>';

  document.getElementById('main').innerHTML=html;

    ['c_VisitsTotal','VisitsTotal','int','#3A5A9C'],['c_VisitsReece','VisitsReece','int','#3A5A9C'],['c_VisitsPoolwerx','VisitsPoolwerx','int','#3A5A9C'],

    ['c_Events','Events','int','#8B00FF'],['c_EventLeads','EventLeads','int','#8B00FF']
  ];

  chartMeta.forEach(function(meta){
    var cid=meta[0],field=meta[1],fmtType=meta[2],color=meta[3];
    var canvas=document.getElementById(cid),inner=document.getElementById('inner_'+cid),outer=document.getElementById('outer_'+cid);
    if (!canvas||!inner||!outer) return;
    var data=hist(field),n=data.length;
    var outerW=outer.clientWidth||600,VISIBLE=8,GAP=6,PADDING=52;
    var BAR=Math.max(12,Math.floor((outerW-PADDING-GAP*VISIBLE)/VISIBLE));
    var totalW=Math.max(n*(BAR+GAP)+PADDING,outerW);
    inner.style.width=totalW+'px'; canvas.style.width=totalW+'px'; canvas.style.height='94px';
    var bgColors=data.map(function(_,i){return i===selIdxInSlice?color:color+'30';});
    var borderColors=data.map(function(_,i){return i===selIdxInSlice?color:color+'60';});
    chartInstances[cid]=new Chart(canvas,{
      type:'bar',
      data:{labels:labels,datasets:[{data:data,backgroundColor:bgColors,borderColor:borderColors,borderWidth:2,borderRadius:5,barThickness:BAR}]},
      options:{responsive:false,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#001F8C',borderColor:'#0038FF',borderWidth:1,titleColor:'#7DDFFF',bodyColor:'white',cornerRadius:8,callbacks:{label:function(ctx){return ' '+fmt(ctx.raw,fmtType);},title:function(ctx){return ctx[0].label;}}}},

          y:{grid:{color:'rgba(0,56,255,0.06)',drawBorder:false},ticks:{font:{size:9,weight:'600'},maxTicksLimit:4,color:'#6B8BB5'},beginAtZero:false}
        }}
    });
    outer.scrollLeft=totalW;
  });
